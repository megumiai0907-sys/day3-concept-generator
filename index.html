<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売れるコンセプト自動錬成ジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Warm Palette based on the requested Tonma */
            --bg: #FAF7F3;
            --white: #FFFFFF;
            --lav: #EDE8DF;
            --lav-d: #C8A882;
            --rose: #C8906C;
            --rose-s: #E8D0BC;
            --peach: #D4B890;
            --peach-s: #EDE0CC;
            --ink: #1C1814;
            --txt: #4A3C30;
            --mut: #8A7A68;
            --bdr: rgba(28, 24, 20, 0.08);
            --gc: linear-gradient(135deg, #C8906C 0%, #D4A870 100%);
            --sh1: 0 1px 3px rgba(28, 24, 20, 0.05);
            --sh2: 0 4px 16px rgba(28, 24, 20, 0.08);
            --sh3: 0 10px 40px rgba(28, 24, 20, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 3rem 1.2rem;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* 柔らかな背景デコレーション */
        .deco {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(15px, -15px) scale(1.05);
            }
        }

        .deco-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -150px;
            background: radial-gradient(circle, rgba(200, 144, 108, 0.15) 0%, transparent 70%);
        }

        .deco-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -100px;
            background: radial-gradient(circle, rgba(212, 184, 144, 0.18) 0%, transparent 70%);
            animation-duration: 12s;
            animation-delay: -5s;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background: var(--white);
            border: 1px solid var(--bdr);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: var(--sh3);
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2.5rem 1.5rem;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Zen Old Mincho', serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            color: var(--ink);
            margin-bottom: 0.8rem;
            line-height: 1.5;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--mut);
            margin-bottom: 2.5rem;
            line-height: 1.7;
        }

        .subtitle span {
            display: inline-block;
            background: var(--lav);
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            color: #8A6848;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            font-family: 'Zen Old Mincho', serif;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: var(--ink);
        }

        .label-desc {
            display: block;
            font-size: 0.75rem;
            color: var(--mut);
            margin-bottom: 0.5rem;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: 400;
        }

        textarea {
            width: 100%;
            background: #FAFAFA;
            border: 1px solid #E5E0D8;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: var(--txt);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 90px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        textarea:focus {
            outline: none;
            border-color: var(--rose);
            box-shadow: 0 0 0 3px rgba(200, 144, 108, 0.15);
            background: var(--white);
        }

        textarea::placeholder {
            color: #C2BBB2;
        }

        .btn-generate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1.2rem;
            margin-top: 2.5rem;
            font-family: 'Zen Old Mincho', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: var(--gc);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(200, 144, 108, 0.35);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(200, 144, 108, 0.45);
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        /* 結果表示エリア */
        .result-area {
            display: none;
            margin-top: 3rem;
            padding-top: 2.5rem;
            border-top: 1px dashed #E5E0D8;
            animation: fadeIn 0.6s ease-out;
        }

        .result-area.active {
            display: block;
        }

        .result-badge {
            display: inline-block;
            background: var(--lav);
            color: #8A6848;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            text-align: center;
            display: block;
            width: fit-content;
            margin: 0 auto 1rem;
        }

        .result-title {
            font-family: 'Zen Old Mincho', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--ink);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .result-desc {
            font-size: 0.8rem;
            text-align: center;
            color: var(--mut);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .prompt-box {
            background: var(--ink);
            border-radius: 12px;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #EAE6DF;
            line-height: 1.7;
            margin-bottom: 2rem;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prompt-box::-webkit-scrollbar {
            width: 6px;
        }

        .prompt-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .action-buttons {
            display: grid;
            gap: 1rem;
        }

        @media (min-width: 600px) {
            .action-buttons {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn-copy,
        .btn-chatgpt {
            width: 100%;
            padding: 1.1rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-copy {
            background: var(--white);
            color: var(--txt);
            border: 1.5px solid var(--bdr);
            box-shadow: var(--sh1);
        }

        .btn-copy:hover {
            background: var(--bg);
            border-color: var(--lav-d);
        }

        .btn-copy.copied {
            background: var(--lav);
            border-color: var(--lav-d);
            color: #8A6848;
        }

        .btn-chatgpt {
            background: #2E2318;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(28, 24, 20, 0.2);
        }

        .btn-chatgpt:hover {
            background: var(--ink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(28, 24, 20, 0.3);
        }
    </style>
</head>

<body>

    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>

    <div class="container">
        <p class="subtitle"><span>Concept Generator</span><br>たった3つの質問で、あなた専用の魔法のプロンプトが完成します。</p>
        <h1>売れるコンセプト<br>自動錬成ジェネレーター</h1>


        <div class="form-group" style="margin-top: 3rem;">
            <label for="input-strengths">1. あなたの「強み」は？</label>
            <span class="label-desc">Day2で見つけた強みや、苦なくできることを箇条書きで。</span>
            <textarea id="input-strengths" placeholder="例：人の話を整理する、細かい作業が苦にならない、寄り添うこと"></textarea>
        </div>

        <div class="form-group">
            <label for="input-past">2. 過去に克服した「悩み」は？</label>
            <span class="label-desc">過去のあなたが一番苦しんでいたことは何ですか？</span>
            <textarea id="input-past" placeholder="例：自分には何もないと思い込み、自信が持てなかった"></textarea>
        </div>

        <div class="form-group">
            <label for="input-praise">3. よく「すごいね」「教えて」と言われることは？</label>
            <span class="label-desc">自分では普通でも、他人から褒められることを入れてください。</span>
            <textarea id="input-praise" placeholder="例：スケジュール管理、バラバラな意見をまとめること"></textarea>
        </div>

        <button class="btn-generate" onclick="generatePrompt()">
            プロンプトを生成する
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
        </button>

        <div class="result-area" id="result-area">
            <span class="result-badge">SUCCESS</span>
            <h3 class="result-title">あなた専用のプロンプトが完成しました</h3>
            <p class="result-desc">
                下のボタンでプロンプトの文章をコピーして、<br>そのままChatGPTに貼り付けて送信してください。
            </p>

            <div class="prompt-box" id="prompt-output"></div>

            <div class="action-buttons">
                <button class="btn-copy" id="btn-copy" onclick="copyToClipboard()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    プロンプトをコピー
                </button>

                <a href="https://chatgpt.com/" target="_blank" class="btn-chatgpt">
                    ChatGPTを開く
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        function generatePrompt() {
            const strengths = document.getElementById('input-strengths').value.trim() || '（あなた自身の強み）';
            const past = document.getElementById('input-past').value.trim() || '（あなたが過去に克服した悩み）';
            const praise = document.getElementById('input-praise').value.trim() || '（よく人から「教えて」と言われること）';

            const template = `あなたは億を稼ぐ凄腕の女性起業家プロデューサーであり、天才的なコピーライターです。
以下の私の【強みと経験】をもとに、「高単価でもお客様が殺到する強烈なコンセプト」を3パターン提案してください。

# ターゲット（想定）
・過去の私と同じように悩んでいる女性
・今の現状から抜け出して、理想の人生を歩みたい女性

# 私の【強みと経験】
・自分の強み：
${strengths}

・過去に克服した大きな悩み：
${past}

・人からよく「すごいね」「教えて」と言われること：
${praise}

# 出力条件
以下の「売れるコンセプトの型」に当てはめて、3つの切り口（①王道・②ニッチ・③大穴）で出力してください。

【出力フォーマット】
■ パターン1（王道：一番ニーズが高い切り口）：
・コンセプトキャッチコピー（20文字以内でお客様の感情が動く一言）：
・ターゲット（どんな未来を求めている誰か）：
・ベネフィット（この商品を買うと得られる究極の未来）：
・なぜ私が教える資格があるのか（人生の経験の再定義）：
・🚀 具体的な商品のイメージ（例：どんな講座、お茶会、代行サービスになるか）：
・💰 マネタイズの第一歩（ゼロイチ初心者が、まず何でお金を稼げばいいか）：

■ パターン2（ニッチ：少しずらして競合を避ける切り口）：
〜（上記と同じ）〜

■ パターン3（大穴：私の意外な魅力を掛け合わせた切り口）：
〜（上記と同じ）〜

# 留意事項
・女性が直感的に「ほしい！」「私でも変われるかも！」と思えるような、エモーショナルでワクワクする表現を使ってください。
・ただのノウハウ提供ではなく、「新しい自分のライフスタイルが手に入ること」を強調してください。
・ビジネス未経験（ゼロイチ）の人でも「これなら私にもできそう！仕事のイメージが湧いた！」と思えるように、「具体的な商品」と「マネタイズの第一歩」は超・具体的に書いてください。極力専門用語は使わず、中学生でもわかる言葉にしてください。`;

            const outputDiv = document.getElementById('prompt-output');
            outputDiv.textContent = template;

            const resultArea = document.getElementById('result-area');
            resultArea.classList.add('active');

            // View down
            setTimeout(() => {
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            // Reset button state
            const btnCopy = document.getElementById('btn-copy');
            btnCopy.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> プロンプトをコピー`;
            btnCopy.classList.remove('copied');
        }

        function copyToClipboard() {
            const textToCopy = document.getElementById('prompt-output').textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btnCopy = document.getElementById('btn-copy');
                btnCopy.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> コピー完了！`;
                btnCopy.classList.add('copied');
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert("コピーに失敗しました。お手数ですが手動でコピーしてください。");
            });
        }
    </script>
</body>

</html>
